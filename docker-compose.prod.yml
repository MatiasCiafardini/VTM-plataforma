services:
  db:
    image: postgres:16-alpine
    container_name: vmt-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tattoo_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tattoo_platform"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./tattoo-platform-backend
    container_name: vmt-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./tattoo-platform-backend/.env.production
    ports:
      - "3004:3004"

  frontend:
    build:
      context: ./tattoo-platform-frontend
    container_name: vmt-frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - ./tattoo-platform-frontend/.env.production
    ports:
      - "3005:3005"

  nginx:
    image: nginx:1.27-alpine
    container_name: vmt-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
